apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: shutdown-simulator
spec:
  parentRefs:
  - name: shutdown-simulator
  hostnames:
  - shutdown-simulator.example.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /work
    - path:
        type: PathPrefix
        value: /healthz
    backendRefs:
    - name: shutdown-simulator
      port: 80
